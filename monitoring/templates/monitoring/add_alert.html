{% extends 'monitoring/base.html' %}

{% block title %}Uyarı Ekle{% endblock %}

{% block content %}
<div class="row justify-content-center dm-animate">
    <div class="col-md-7 col-lg-6">
        <div class="card dm-card">
            <div class="card-header">
                <h6><i class="bi bi-plus-circle me-2"></i>Manuel Uyarı Oluştur</h6>
            </div>
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="device" class="form-label fw-medium">Cihaz Seçin</label>
                        <select name="device" id="device" class="form-select" required>
                            <option value="" disabled selected>Bir cihaz seçin...</option>
                            {% for device in devices %}
                            <option value="{{ device.mac_address }}">
                                {{ device.mac_address }} — {{ device.os_info }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="alert_type" class="form-label fw-medium">Uyarı Türü</label>
                        <select name="alert_type" id="alert_type" class="form-select" required>
                            <option value="" disabled selected>Tür seçin...</option>
                            <option value="CPU_HIGH">🔴 CPU Yüksek</option>
                            <option value="RAM_HIGH">🟡 RAM Yüksek</option>
                            <option value="DISK_FULL">🔵 Disk Dolu</option>
                            <option value="OFFLINE">⚫ Çevrimdışı</option>
                            <option value="OTHER">⚪ Diğer</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label fw-medium">Uyarı Mesajı</label>
                        <textarea name="message" id="message" class="form-control" rows="3"
                                  placeholder="Uyarı detayını yazın..." required></textarea>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dm-primary py-2">
                            <i class="bi bi-exclamation-triangle me-1"></i>Uyarıyı Kaydet
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
